# sandogasa-report configuration
#
# Domains define which data sources to query for a report.
# Use with: sandogasa-report -c configs/sandogasa-report/config.toml -d <domain>

# User profiles go in the per-user overlay
# (~/.config/sandogasa-report/config.toml), not here, since they
# contain per-service identities. See `sandogasa-report config`
# for interactive setup.
#
# Example overlay:
#   [users.michel]
#   fas = "salimma"
#   bugzilla_email = "michel@example.com"
#
#   [users.michel.gitlab]
#   "gitlab.com" = "michel-slm"
#   "salsa.debian.org" = "michel"

# --- Fedora domains ---

[domains.fedora]
bugzilla = true
bodhi = true
bodhi_releases = ["F*", "EPEL-*"]
fedora_versions = [42, 43, 44]

[domains.epel]
bugzilla = true
bodhi = true
bodhi_releases = ["EPEL-*"]

# --- CentOS SIG domains ---

[domains.hyperscale]
koji_profile = "cbs"
koji_tags = [
    "hyperscale{9,10}s-packages-{main,experimental,spin}-release",
    "hyperscale10s-packages-kernel-release",
]
[domains.hyperscale.gitlab]
instance = "https://gitlab.com"
group = "CentOS/Hyperscale"

[domains.proposed-updates]
koji_profile = "cbs"
koji_tags = [
    "proposed_updates{9,10}s-packages-main-release",
]
[domains.proposed-updates.gitlab]
instance = "https://gitlab.com"
group = "CentOS/proposed_updates"

# --- Debian ---

[domains.debian]
[domains.debian.gitlab]
instance = "https://salsa.debian.org"
# No group filter — all user activity on salsa counts.

# --- Package groups for categorical reporting ---
# Each group has an optional description and a list of packages.
# The group key is prettified for the heading
# (e.g. "developer-tools" → "Developer Tools").
# If a description is set, it appears as a paragraph below the heading.

[groups.hardware-enablement]
description = "Hardware enablement and GPU support"
packages = ["intel-gpu-tools", "libdrm", "mesa"]

[groups.developer-tools]
packages = ["neovim", "helix", "fish"]

[groups.benchmarking]
packages = ["fio", "sysbench", "stress-ng"]
