# sandogasa-report configuration
#
# Domains define which data sources to query for a report.
# Use with: sandogasa-report -c configs/sandogasa-report/config.toml -d <domain>

# User profiles go in the per-user overlay
# (~/.config/sandogasa-report/config.toml), not here, since they
# contain per-service identities. See `sandogasa-report config`
# for interactive setup.
#
# Example overlay:
#   [users.michel]
#   fas = "salimma"
#   bugzilla_email = "michel@example.com"
#
#   [users.michel.gitlab]
#   "gitlab.com" = "michel-slm"
#   "salsa.debian.org" = "michel"

# --- Fedora domains ---

[domains.fedora]
bugzilla = true
bodhi = true
bodhi_releases = ["F*", "EPEL-*"]
fedora_versions = [42, 43, 44]

[domains.epel]
bugzilla = true
bodhi = true
bodhi_releases = ["EPEL-*"]

# --- CentOS SIG domains ---

[domains.hyperscale]
koji_profile = "cbs"
koji_tags = [
    "hyperscale{9,10}s-packages-{main,experimental,spin}-release",
    "hyperscale10s-packages-kernel-release",
]
[domains.hyperscale.gitlab]
instance = "https://gitlab.com"
group = "CentOS/Hyperscale"

[domains.proposed-updates]
koji_profile = "cbs"
koji_tags = [
    "proposed_updates{9,10}s-packages-main-release",
]
[domains.proposed-updates.gitlab]
instance = "https://gitlab.com"
group = "CentOS/proposed_updates"

# --- Debian ---

[domains.debian]
[domains.debian.gitlab]
instance = "https://salsa.debian.org"
# No group filter — all user activity on salsa counts.

# --- Upstream forges (GitHub + Forgejo + Sourcehut) ---

# All your github.com PR / commit / review activity, any owner.
# Add `org = "..."` to scope to one organisation.
[domains.upstream.github]

# Forgejo / Gitea (here, codeberg.org): PRs you opened and merged.
# The forge type is the table key (`forgejo`) — the specific host is
# the `instance` value, mirroring how `gitlab` works. So it's
# `domains.upstream.forgejo` with `instance = "https://codeberg.org"`,
# not `domains.upstream.codeberg`.
#
# The query is token-scoped (it reports the token owner's PRs), so it
# captures contributions across *every* repo you touch, not just your
# own namespace. Add `owner = "..."` to restrict to one repo-owner.
#
# A domain targets a single Forgejo instance; for another instance
# (e.g. a Fedora Forgejo) add it under a different domain.
[domains.upstream.forgejo]
instance = "https://codeberg.org"

# Sourcehut (sr.ht): patches you sent (lists.sr.ht — the patch-based PR
# analog, with `APPLIED` as the merged analog), tickets you opened /
# closed (todo.sr.ht), and commits you authored in your own repos
# (git.sr.ht). sr.ht has no unified PR model, so each service is queried
# separately; a service being unreachable just skips that section.
#
# `instance` is the sr.ht host (bare, no scheme) — service endpoints
# (git.<host>, todo.<host>, lists.<host>) are derived from it. Use a
# self-hosted host here for a private instance; a second instance goes
# under a different domain.
#
# Your per-instance login lives in the overlay under
# `[users.<key>.sourcehut]` (e.g. `"sr.ht" = "michel"`, the bare login
# without the leading `~`). The token is a personal access token from
# meta.sr.ht/oauth2/personal-token (grants read across services by
# default); set it via `sandogasa-report config` or
# `SOURCEHUT_TOKEN[_<HOST>]`.
#
# Commits are split into yours vs third-party by matching the git author
# email. sr.ht exposes only your account's *primary* email, so if you
# commit under other addresses (e.g. a Fedora one) list them in your
# overlay as `git_emails` on the profile — `[users.<key>] git_emails =
# ["you@fedoraproject.org"]` — or `["*"]` to count every commit in your
# repos as yours. `sandogasa-report config` prompts for this.
#
# Note: ticket metrics come from the authenticated user's activity feed,
# so they only populate when the reported user is the token owner.
[domains.upstream.sourcehut]
instance = "sr.ht"

# --- Package groups for categorical reporting ---
# Each group has an optional description and a list of packages.
# The group key is prettified for the heading
# (e.g. "developer-tools" → "Developer Tools").
# If a description is set, it appears as a paragraph below the heading.

[groups.hardware-enablement]
description = "Hardware enablement and GPU support"
packages = ["intel-gpu-tools", "libdrm", "mesa"]

[groups.developer-tools]
packages = ["neovim", "helix", "fish"]

[groups.benchmarking]
packages = ["fio", "sysbench", "stress-ng"]
