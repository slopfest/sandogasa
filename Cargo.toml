[workspace]
resolver = "3"
members = [
    "crates/sandogasa-bodhi",
    "crates/sandogasa-bugzilla",
    "crates/sandogasa-distgit",
    "crates/sandogasa-nvd",
    "tools/fedora-cve-triage",
    "tools/sandogasa-pkg-acl",
]

# sandogasa (菅笠, a Japanese straw hat) is often associated with
# "slum" or post-apocalyptic robots in popular culture.

[workspace.package]
version = "0.3.1"
edition = "2024"
license = "MPL-2.0"
repository = "https://github.com/slopfest/fedora-cve-triage"

[workspace.dependencies]
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
wiremock = "0.6"
