[package]
name = "fedora-cve-triage"
version = "0.2.0"
edition = "2024"
description = "A tool for triaging CVEs reported against Fedora components in Bugzilla"
license = "MPL-2.0"
repository = "https://github.com/slopfest/fedora-cve-triage"

[dependencies]
clap = { version = "4", features = ["derive"] }
dirs = "6"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
toml = "0.8"
version-compare = "0.2"

[dev-dependencies]
tempfile = "3"
