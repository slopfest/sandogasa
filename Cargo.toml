[workspace]
members = [
    ".",
    "crates/sandogasa-bodhi",
    "crates/sandogasa-bugzilla",
    "crates/sandogasa-distgit",
    "crates/sandogasa-nvd",
]

# sandogasa (菅笠, a Japanese straw hat) is often associated with
# "slum" or post-apocalyptic robots in popular culture.

[workspace.package]
version = "0.3.0"
edition = "2024"
license = "MPL-2.0"
repository = "https://github.com/slopfest/fedora-cve-triage"

[workspace.dependencies]
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
wiremock = "0.6"

[package]
name = "fedora-cve-triage"
description = "A tool for triaging CVEs reported against Fedora components in Bugzilla"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
clap = { version = "4", features = ["derive"] }
dirs = "6"
chrono = { workspace = true }
reqwest = { workspace = true }
sandogasa-bodhi = { path = "crates/sandogasa-bodhi" }
sandogasa-bugzilla = { path = "crates/sandogasa-bugzilla" }
sandogasa-distgit = { path = "crates/sandogasa-distgit" }
sandogasa-nvd = { path = "crates/sandogasa-nvd" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
toml = "0.8"
version-compare = "0.2"
rpassword = "7"

[dev-dependencies]
tempfile = "3"
wiremock = { workspace = true }
