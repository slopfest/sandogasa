<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Penguin head -->
  <ellipse cx="256" cy="310" rx="140" ry="155" fill="#1A1A2E"/>
  <!-- White face patch -->
  <ellipse cx="256" cy="330" rx="95" ry="115" fill="#F0F0F0"/>

  <!-- Eyes -->
  <circle cx="205" cy="295" r="24" fill="white"/>
  <circle cx="307" cy="295" r="24" fill="white"/>
  <circle cx="210" cy="293" r="14" fill="#1A1A2E"/>
  <circle cx="312" cy="293" r="14" fill="#1A1A2E"/>
  <circle cx="214" cy="289" r="5" fill="white"/>
  <circle cx="316" cy="289" r="5" fill="white"/>

  <!-- Beak -->
  <path d="M230,340 L256,385 L282,340 Z" fill="#E8942A" stroke="#C47A1A" stroke-width="2" stroke-linejoin="round"/>

  <!-- Cheek blush -->
  <ellipse cx="175" cy="340" rx="16" ry="10" fill="#FF9999" opacity="0.3"/>
  <ellipse cx="337" cy="340" rx="16" ry="10" fill="#FF9999" opacity="0.3"/>

  <!-- Sandogasa hat -->
  <!-- Hat cone -->
  <polygon points="256,40 420,195 92,195" fill="#D4A54A" stroke="#8B6914" stroke-width="4" stroke-linejoin="round"/>
  <!-- Hat brim -->
  <rect x="80" y="188" width="352" height="14" rx="4" fill="#C49A3C" stroke="#8B6914" stroke-width="4"/>
  <!-- Weave lines -->
  <line x1="256" y1="60" x2="130" y2="190" stroke="#B8882E" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="60" x2="180" y2="190" stroke="#B8882E" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="60" x2="230" y2="190" stroke="#B8882E" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="60" x2="282" y2="190" stroke="#B8882E" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="60" x2="332" y2="190" stroke="#B8882E" stroke-width="1.5" opacity="0.5"/>
  <line x1="256" y1="60" x2="382" y2="190" stroke="#B8882E" stroke-width="1.5" opacity="0.5"/>
  <!-- Horizontal weave -->
  <line x1="190" y1="125" x2="322" y2="125" stroke="#B8882E" stroke-width="1.5" opacity="0.4"/>
  <line x1="155" y1="160" x2="357" y2="160" stroke="#B8882E" stroke-width="1.5" opacity="0.4"/>

  <!-- Chin strap -->
  <path d="M120,208 Q105,290 140,370" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <path d="M392,208 Q407,290 372,370" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
</svg>
